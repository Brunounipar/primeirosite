<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Contato</title>
</head>
<body>
    <div class="container">
      <header class="primeiro_titulo">
        <h1>O Senhor dos Anéis</h1>
        <h2>Uma das trilogias mais famosas do cinema</h2>
        <nav>
          <a href="index.html">Home</a>
          <a href="sinopse.html">Sinopse</a>
          <a href="imagemfilme.html">Imagem do Filme</a>
          <a href="personagem.html">Personagens Principais</a>
          <a href="informaçõesfilme.html">Informações</a>
          <a href="curiosidades.html">Curiosidades</a>
          <a href="impactocultural.html">Impacto Cultural</a>
          <a href="ordemdosfilmes.html">Ordem dos Filmes</a>
        </nav>
      </header>
      <h2>Entrem em Contato</h2>
      <form action="processa.php" method="post" autocomplete="off">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br><br>
        <label for="ano">Ano de nascimento:</label>
        <input type="number" id="ano" name="ano" required>
        <br><br>
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" required>
        <br><br>
        <label for="informe seu github">Informe seu github:</label>
        <input type="url" id="github" name="github" required>
        <br><br>
        <label for="informe sua senha">Informe sua senha:</label>
        <input type="password" id="senha" name="senha" required>
        <br><br>
        <label for="anexe um arquivo">Anexe um arquivo:</label>
        <input type="file" id="arquivo" name="arquivo" required>
        <br><br>
        <label for="escolha uma cor">Escolha uma cor:</label>
        <input type="color" id="cor" name="cor" required>
        <br><br>
        <fieldset>
            <legend>Campos de tempo</legend>
        <label for="data">Informe a data:</label>
        <input type="date" id="data" name="data" required>
        <br><br>
        <label for="mes">Escolha um mês:</label>
        <input type="month" id="mes" name="mes" required>
        <br><br>
        <label for="semana">Informe a semana:</label>
        <input type="week" id="semana" name="semana" required>
        <br><br>
        <label for="hora">Informe a hora:</label>
        <input type="time" id="hora" name="hora" required>
        <br><br>
        <label for="data e hora">Informe a data e hora:</label>
        <input type="datetime-local" id="datahora" name="datahora" required><br><br>
        </fieldset>

        <label for="pesquisa">Pesquisa:</label>
        <input type="search" id="pesquisa" name="pesquisa" required><br><br>

        <label for="descricao">Informe aqui o que voce gosta nos filmes:</label><br>
        <textarea cols="30" rows="10" id="descricao" name="descricao" required>          
        </textarea><br><br>

        <fieldset>
            <legend>Escolha uma opção</legend>
            <label for="filme1">Filme 1</label>
            <input type="radio" id="filme1" name="filme" value="filme1" required>
            <br><br>
            <label for="filme2">Filme 2</label>
            <input type="radio" id="filme2" name="filme" value="filme2" required>
            <br><br>
            <label for="filme3">Filme 3</label>
            <input type="radio" id="filme3" name="filme" value="filme3" required>
            <br><br>
        </fieldset>


        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
      </form>
    </div>
</body>
</html>
